name: Java CI/CD with Jenkins

on:
  push:
    branches:
      - master

jobs:
  trigger-jenkins:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Jenkins Crumb
        id: crumb
        run: |
          echo "Fetching Jenkins Crumb..."
          CRUMB=$(curl -s --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}" \
          "${{ secrets.JENKINS_URL }}/crumbIssuer/api/json" | jq -r '.crumb')

          echo "crumb=$CRUMB" >> $GITHUB_OUTPUT

      - name: Trigger Jenkins Job
        run: |
          echo "Triggering Jenkins Job..."
          
          curl -X POST "${{ secrets.JENKINS_URL }}/job/${{ secrets.JENKINS_JOB }}/build" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}" \
            -H "Jenkins-Crumb: ${{ steps.crumb.outputs.crumb }}"
